<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="800" y2="450">
      <stop offset="0%" stop-color="#060d1f"/>
      <stop offset="50%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d0f2b"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#131e35"/>
      <stop offset="100%" stop-color="#0b1425"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="44%" r="35%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#3b82f6" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="outerGlow" cx="50%" cy="44%" r="50%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg1)" rx="16"/>

  <!-- Subtle grid -->
  <g opacity="0.04">
    <line x1="0" y1="75" x2="800" y2="75" stroke="white"/>
    <line x1="0" y1="150" x2="800" y2="150" stroke="white"/>
    <line x1="0" y1="225" x2="800" y2="225" stroke="white"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="white"/>
    <line x1="0" y1="375" x2="800" y2="375" stroke="white"/>
    <line x1="100" y1="0" x2="100" y2="450" stroke="white"/>
    <line x1="200" y1="0" x2="200" y2="450" stroke="white"/>
    <line x1="300" y1="0" x2="300" y2="450" stroke="white"/>
    <line x1="400" y1="0" x2="400" y2="450" stroke="white"/>
    <line x1="500" y1="0" x2="500" y2="450" stroke="white"/>
    <line x1="600" y1="0" x2="600" y2="450" stroke="white"/>
    <line x1="700" y1="0" x2="700" y2="450" stroke="white"/>
  </g>

  <!-- Large blue glow orbs -->
  <rect width="800" height="450" fill="url(#outerGlow)"/>
  <rect width="800" height="450" fill="url(#centerGlow)"/>

  <!-- Extra glow spots -->
  <circle cx="400" cy="195" r="120" fill="#3b82f6" opacity="0.07" filter="url(#softGlow)"/>
  <circle cx="360" cy="210" r="60" fill="#818cf8" opacity="0.06" filter="url(#softGlow)"/>

  <!-- ====== CENTER: TikTok logo in glowing card ====== -->
  <g transform="translate(330,100)">
    <!-- Card bg glow -->
    <rect x="-10" y="-10" width="150" height="150" rx="36" fill="#3b82f6" opacity="0.12" filter="url(#softGlow)"/>
    <!-- Card -->
    <rect width="130" height="130" rx="30" fill="url(#card1)" stroke="white" stroke-opacity="0.1" stroke-width="1.2"/>
    <!-- Inner glow ring -->
    <rect x="4" y="4" width="122" height="122" rx="26" fill="none" stroke="#3b82f6" stroke-opacity="0.15" stroke-width="1"/>

    <!-- TikTok Logo — using actual paths, scaled and centered -->
    <g transform="translate(30,28) scale(1.5)">
      <path d="M38.4 21.7V16c-3.2 0-5.6-1-7.2-2.8-1.8-2-2.6-4.6-2.8-6.2h-5.8v25.6c0 2.8-2.2 5.2-5.2 5.2-1.6 0-3-.7-4-1.8-1-1-1.6-2.4-1.6-4 0-3.2 2.6-5.8 5.8-5.8.6 0 1.2.1 1.8.3V20.3c-.6-.1-1.2-.1-1.8-.1-6.6 0-12 5.4-12 12s5.4 12 12 12c6.6 0 12-5.4 12-12V21.8c2.4 1.6 5.2 2.5 8.2 2.5v-2.6h-.4z" fill="#25F4EE"/>
      <path d="M40 19.7V14c-3.2 0-5.6-1-7.2-2.8-1.8-2-2.6-4.6-2.8-6.2h-5.8v25.6c0 2.8-2.2 5.2-5.2 5.2-1.6 0-3-.7-4-1.8-1-1-1.6-2.4-1.6-4 0-3.2 2.6-5.8 5.8-5.8.6 0 1.2.1 1.8.3V18.3c-.6-.1-1.2-.1-1.8-.1-6.6 0-12 5.4-12 12s5.4 12 12 12c6.6 0 12-5.4 12-12V19.8c2.4 1.6 5.2 2.5 8.2 2.5v-2.6H40z" fill="#FE2C55"/>
      <path d="M39.2 20.7V15c-3.2 0-5.6-1-7.2-2.8-1.8-2-2.6-4.6-2.8-6.2H23.4V31.6c0 2.8-2.2 5.2-5.2 5.2-1.6 0-3-.7-4-1.8-1-1-1.6-2.4-1.6-4 0-3.2 2.6-5.8 5.8-5.8.6 0 1.2.1 1.8.3V19.3c-.6-.1-1.2-.1-1.8-.1-6.6 0-12 5.4-12 12s5.4 12 12 12c6.6 0 12-5.4 12-12V20.8c2.4 1.6 5.2 2.5 8.2 2.5v-2.6h-.4z" fill="white"/>
    </g>
  </g>

  <!-- ====== LEFT: Code snippet card ====== -->
  <g transform="translate(70,115)">
    <!-- Card glow -->
    <rect x="-5" y="-5" width="200" height="210" rx="16" fill="#06b6d4" opacity="0.04" filter="url(#softGlow)"/>
    <!-- Card -->
    <rect width="190" height="200" rx="14" fill="url(#card1)" stroke="white" stroke-opacity="0.08" stroke-width="1"/>
    <!-- Top bar -->
    <rect width="190" height="28" rx="14" fill="white" fill-opacity="0.03"/>
    <circle cx="16" cy="14" r="3.5" fill="#ef4444" opacity="0.5"/>
    <circle cx="28" cy="14" r="3.5" fill="#fbbf24" opacity="0.5"/>
    <circle cx="40" cy="14" r="3.5" fill="#34d399" opacity="0.5"/>
    <text x="95" y="17" text-anchor="middle" font-size="8" fill="#475569" font-family="monospace">pixel.js</text>
    <!-- Code lines -->
    <text x="14" y="50" font-family="monospace" font-size="11" fill="#22d3ee" opacity="0.9">&lt;script&gt;</text>
    <text x="26" y="70" font-family="monospace" font-size="10.5" fill="#94a3b8">ttq.load(</text>
    <text x="36" y="88" font-family="monospace" font-size="10.5" fill="#a78bfa">'PIXEL_ID'</text>
    <text x="26" y="106" font-family="monospace" font-size="10.5" fill="#94a3b8">);</text>
    <text x="26" y="128" font-family="monospace" font-size="10.5" fill="#94a3b8">ttq.page();</text>
    <text x="26" y="150" font-family="monospace" font-size="10.5" fill="#94a3b8">ttq.track(</text>
    <text x="36" y="168" font-family="monospace" font-size="10.5" fill="#34d399">'Purchase'</text>
    <text x="26" y="186" font-family="monospace" font-size="10.5" fill="#94a3b8">);</text>
    <text x="14" y="198" font-family="monospace" font-size="11" fill="#22d3ee" opacity="0.9">&lt;/script&gt;</text>
  </g>

  <!-- ====== FLOW ARROWS with glow ====== -->
  <g filter="url(#glow2)">
    <!-- Left to center -->
    <path d="M270 215 C300 215, 310 190, 330 180" stroke="#3b82f6" stroke-width="1.8" stroke-dasharray="6 4" fill="none" opacity="0.6"/>
    <circle cx="330" cy="178" r="3" fill="#3b82f6" opacity="0.8"/>

    <!-- Center to right cards -->
    <path d="M465 155 C490 155, 510 145, 535 140" stroke="#22d3ee" stroke-width="1.8" stroke-dasharray="6 4" fill="none" opacity="0.5"/>
    <circle cx="537" cy="139" r="3" fill="#22d3ee" opacity="0.8"/>

    <path d="M465 195 C490 195, 510 210, 535 215" stroke="#818cf8" stroke-width="1.8" stroke-dasharray="6 4" fill="none" opacity="0.5"/>
    <circle cx="537" cy="216" r="3" fill="#818cf8" opacity="0.8"/>

    <path d="M465 210 C500 225, 510 275, 535 288" stroke="#34d399" stroke-width="1.8" stroke-dasharray="6 4" fill="none" opacity="0.5"/>
    <circle cx="537" cy="289" r="3" fill="#34d399" opacity="0.8"/>
  </g>

  <!-- ====== RIGHT: Event data cards ====== -->
  <!-- Card 1: Page Views -->
  <g transform="translate(545,110)">
    <rect x="-3" y="-3" width="196" height="61" rx="14" fill="#06b6d4" opacity="0.05" filter="url(#glow1)"/>
    <rect width="190" height="55" rx="12" fill="url(#card1)" stroke="#22d3ee" stroke-opacity="0.2" stroke-width="1"/>
    <circle cx="27" cy="27" r="14" fill="#22d3ee" opacity="0.12"/>
    <circle cx="27" cy="27" r="8" fill="#22d3ee" opacity="0.25"/>
    <circle cx="27" cy="27" r="3" fill="#22d3ee"/>
    <text x="52" y="22" font-size="13" font-weight="700" fill="white" opacity="0.9" font-family="system-ui">Page Views</text>
    <text x="52" y="40" font-size="11.5" fill="#22d3ee" opacity="0.75" font-family="system-ui">2,847 tracked</text>
  </g>

  <!-- Card 2: Add to Cart -->
  <g transform="translate(545,185)">
    <rect x="-3" y="-3" width="196" height="61" rx="14" fill="#818cf8" opacity="0.05" filter="url(#glow1)"/>
    <rect width="190" height="55" rx="12" fill="url(#card1)" stroke="#818cf8" stroke-opacity="0.2" stroke-width="1"/>
    <circle cx="27" cy="27" r="14" fill="#818cf8" opacity="0.12"/>
    <circle cx="27" cy="27" r="8" fill="#818cf8" opacity="0.25"/>
    <circle cx="27" cy="27" r="3" fill="#818cf8"/>
    <text x="52" y="22" font-size="13" font-weight="700" fill="white" opacity="0.9" font-family="system-ui">Add to Cart</text>
    <text x="52" y="40" font-size="11.5" fill="#a78bfa" opacity="0.75" font-family="system-ui">438 events</text>
  </g>

  <!-- Card 3: Purchases -->
  <g transform="translate(545,260)">
    <rect x="-3" y="-3" width="196" height="61" rx="14" fill="#34d399" opacity="0.05" filter="url(#glow1)"/>
    <rect width="190" height="55" rx="12" fill="url(#card1)" stroke="#34d399" stroke-opacity="0.2" stroke-width="1"/>
    <circle cx="27" cy="27" r="14" fill="#34d399" opacity="0.12"/>
    <circle cx="27" cy="27" r="8" fill="#34d399" opacity="0.25"/>
    <polyline points="22,27 26,31 33,23" fill="none" stroke="#34d399" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="52" y="22" font-size="13" font-weight="700" fill="white" opacity="0.9" font-family="system-ui">Purchases</text>
    <text x="52" y="40" font-size="11.5" fill="#34d399" opacity="0.75" font-family="system-ui">127 conversions</text>
  </g>

  <!-- ====== BOTTOM: Label ====== -->
  <g>
    <text x="400" y="385" text-anchor="middle" font-size="17" font-weight="700" fill="white" opacity="0.75" font-family="system-ui">How TikTok Pixel Tracks Your Visitors</text>
    <text x="400" y="412" text-anchor="middle" font-size="12" fill="#64748b" font-family="system-ui">Website code  &#8594;  Event detection  &#8594;  Ads Manager insights</text>
  </g>

  <!-- Decorative corner glows -->
  <circle cx="0" cy="0" r="120" fill="#3b82f6" opacity="0.04"/>
  <circle cx="800" cy="450" r="150" fill="#818cf8" opacity="0.04"/>
</svg>
