<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="800" y2="450">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="step" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="glow3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg3)" rx="16"/>
  <!-- Dot grid -->
  <g opacity="0.05">
    <pattern id="dots3" x="0" y="0" width="25" height="25" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.8" fill="white"/>
    </pattern>
    <rect width="800" height="450" fill="url(#dots3)"/>
  </g>
  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" font-size="17" font-weight="700" fill="white" opacity="0.85" font-family="system-ui">3-Step Pixel Installation Process</text>
  <!-- Connecting line -->
  <line x1="200" y1="200" x2="600" y2="200" stroke="url(#glow3)" stroke-width="2" stroke-dasharray="8 4" opacity="0.3"/>
  <!-- Step 1 -->
  <g transform="translate(80,90)">
    <rect width="200" height="220" rx="16" fill="url(#step)" stroke="white" stroke-opacity="0.08" stroke-width="1"/>
    <!-- Number badge -->
    <circle cx="100" cy="35" r="18" fill="url(#glow3)" opacity="0.9"/>
    <text x="100" y="41" text-anchor="middle" font-size="16" font-weight="800" fill="white" font-family="system-ui">1</text>
    <text x="100" y="75" text-anchor="middle" font-size="13" font-weight="700" fill="white" opacity="0.9" font-family="system-ui">Create Pixel</text>
    <!-- Icon: screen with plus -->
    <rect x="60" y="95" width="80" height="55" rx="6" fill="white" fill-opacity="0.05" stroke="white" stroke-opacity="0.1"/>
    <line x1="100" y1="110" x2="100" y2="135" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="87" y1="122" x2="113" y2="122" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
    <text x="100" y="175" text-anchor="middle" font-size="10" fill="#94a3b8" font-family="system-ui">Open TikTok Ads</text>
    <text x="100" y="190" text-anchor="middle" font-size="10" fill="#94a3b8" font-family="system-ui">Manager &amp; create</text>
    <text x="100" y="205" text-anchor="middle" font-size="10" fill="#94a3b8" font-family="system-ui">a new pixel</text>
  </g>
  <!-- Arrow 1 -->
  <polygon points="290,200 305,192 305,208" fill="#3b82f6" opacity="0.6"/>
  <!-- Step 2 -->
  <g transform="translate(305,90)">
    <rect width="200" height="220" rx="16" fill="url(#step)" stroke="white" stroke-opacity="0.08" stroke-width="1"/>
    <circle cx="100" cy="35" r="18" fill="url(#glow3)" opacity="0.9"/>
    <text x="100" y="41" text-anchor="middle" font-size="16" font-weight="800" fill="white" font-family="system-ui">2</text>
    <text x="100" y="75" text-anchor="middle" font-size="13" font-weight="700" fill="white" opacity="0.9" font-family="system-ui">Install Code</text>
    <!-- Code bracket icon -->
    <rect x="55" y="95" width="90" height="55" rx="6" fill="white" fill-opacity="0.05" stroke="white" stroke-opacity="0.1"/>
    <text x="77" y="128" font-family="monospace" font-size="22" fill="#8b5cf6" opacity="0.9">&lt;/&gt;</text>
    <text x="100" y="175" text-anchor="middle" font-size="10" fill="#94a3b8" font-family="system-ui">Paste the snippet</text>
    <text x="100" y="190" text-anchor="middle" font-size="10" fill="#94a3b8" font-family="system-ui">inside your site's</text>
    <text x="100" y="205" text-anchor="middle" font-size="10" fill="#94a3b8" font-family="system-ui">&lt;head&gt; tag</text>
  </g>
  <!-- Arrow 2 -->
  <polygon points="515,200 530,192 530,208" fill="#8b5cf6" opacity="0.6"/>
  <!-- Step 3 -->
  <g transform="translate(530,90)">
    <rect width="200" height="220" rx="16" fill="url(#step)" stroke="white" stroke-opacity="0.08" stroke-width="1"/>
    <circle cx="100" cy="35" r="18" fill="url(#glow3)" opacity="0.9"/>
    <text x="100" y="41" text-anchor="middle" font-size="16" font-weight="800" fill="white" font-family="system-ui">3</text>
    <text x="100" y="75" text-anchor="middle" font-size="13" font-weight="700" fill="white" opacity="0.9" font-family="system-ui">Verify Setup</text>
    <!-- Check shield icon -->
    <g transform="translate(73,95)">
      <rect width="55" height="55" rx="6" fill="white" fill-opacity="0.05" stroke="white" stroke-opacity="0.1"/>
      <path d="M27 8 L45 16 V30 C45 40 37 47 27 50 C17 47 9 40 9 30 V16 Z" fill="none" stroke="#34d399" stroke-width="2" opacity="0.8"/>
      <polyline points="18,28 25,35 38,22" fill="none" stroke="#34d399" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="100" y="175" text-anchor="middle" font-size="10" fill="#94a3b8" font-family="system-ui">Use Pixel Helper</text>
    <text x="100" y="190" text-anchor="middle" font-size="10" fill="#94a3b8" font-family="system-ui">Chrome extension</text>
    <text x="100" y="205" text-anchor="middle" font-size="10" fill="#94a3b8" font-family="system-ui">to confirm it works</text>
  </g>
  <!-- Bottom bar -->
  <rect x="100" y="340" width="600" height="4" rx="2" fill="white" fill-opacity="0.05"/>
  <rect x="100" y="340" width="600" height="4" rx="2" fill="url(#glow3)" opacity="0.5"/>
  <!-- Bottom labels -->
  <text x="400" y="380" text-anchor="middle" font-size="13" fill="white" opacity="0.5" font-family="system-ui">Complete setup in under 15 minutes</text>
  <!-- Time badges -->
  <g transform="translate(195,395)">
    <rect width="60" height="22" rx="11" fill="white" fill-opacity="0.05" stroke="white" stroke-opacity="0.08"/>
    <text x="30" y="15" text-anchor="middle" font-size="9" fill="#3b82f6" font-family="system-ui">~3 min</text>
  </g>
  <g transform="translate(375,395)">
    <rect width="60" height="22" rx="11" fill="white" fill-opacity="0.05" stroke="white" stroke-opacity="0.08"/>
    <text x="30" y="15" text-anchor="middle" font-size="9" fill="#8b5cf6" font-family="system-ui">~5 min</text>
  </g>
  <g transform="translate(555,395)">
    <rect width="60" height="22" rx="11" fill="white" fill-opacity="0.05" stroke="white" stroke-opacity="0.08"/>
    <text x="30" y="15" text-anchor="middle" font-size="9" fill="#34d399" font-family="system-ui">~2 min</text>
  </g>
</svg>
