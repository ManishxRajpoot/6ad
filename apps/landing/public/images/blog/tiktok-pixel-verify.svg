<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="800" y2="450">
      <stop offset="0%" stop-color="#0c1222"/>
      <stop offset="100%" stop-color="#1a1040"/>
    </linearGradient>
    <linearGradient id="green4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="red4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg4)" rx="16"/>
  <g opacity="0.04">
    <pattern id="dots4" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.8" fill="white"/>
    </pattern>
    <rect width="800" height="450" fill="url(#dots4)"/>
  </g>
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="white" opacity="0.85" font-family="system-ui">Pixel Verification Checklist</text>
  <!-- Browser mockup -->
  <g transform="translate(60,65)">
    <rect width="420" height="320" rx="12" fill="#0f172a" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
    <!-- Browser bar -->
    <rect width="420" height="36" rx="12" fill="white" fill-opacity="0.04"/>
    <circle cx="18" cy="18" r="5" fill="#ef4444" opacity="0.6"/>
    <circle cx="34" cy="18" r="5" fill="#fbbf24" opacity="0.6"/>
    <circle cx="50" cy="18" r="5" fill="#34d399" opacity="0.6"/>
    <rect x="75" y="10" width="260" height="16" rx="8" fill="white" fill-opacity="0.06"/>
    <text x="205" y="22" text-anchor="middle" font-size="8" fill="#64748b" font-family="system-ui">yourstore.com/checkout</text>
    <!-- Extension popup -->
    <rect x="350" y="8" width="60" height="20" rx="4" fill="#34d399" opacity="0.2" stroke="#34d399" stroke-opacity="0.3"/>
    <text x="380" y="22" text-anchor="middle" font-size="8" font-weight="600" fill="#34d399" font-family="system-ui">Helper</text>
    <!-- Content area: pixel status -->
    <g transform="translate(20,50)">
      <rect width="380" height="42" rx="8" fill="#34d399" fill-opacity="0.08" stroke="#34d399" stroke-opacity="0.15"/>
      <circle cx="22" cy="21" r="9" fill="url(#green4)" opacity="0.9"/>
      <polyline points="17,21 21,25 28,17" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="42" y="17" font-size="11" font-weight="600" fill="#34d399" font-family="system-ui">Pixel Active — ID: CTJ8P4RC77U</text>
      <text x="42" y="32" font-size="9" fill="#34d399" opacity="0.7" font-family="system-ui">Receiving events successfully</text>
    </g>
    <!-- Event list -->
    <g transform="translate(20,105)">
      <text x="0" y="12" font-size="10" font-weight="600" fill="white" opacity="0.5" font-family="system-ui">EVENTS DETECTED</text>
      <!-- Event rows -->
      <g transform="translate(0,25)">
        <rect width="380" height="32" rx="6" fill="white" fill-opacity="0.03"/>
        <circle cx="15" cy="16" r="4" fill="#34d399"/>
        <text x="30" y="20" font-size="10" fill="white" opacity="0.75" font-family="system-ui">PageView</text>
        <text x="300" y="20" font-size="9" fill="#64748b" font-family="system-ui">Fired 1.2s ago</text>
      </g>
      <g transform="translate(0,62)">
        <rect width="380" height="32" rx="6" fill="white" fill-opacity="0.03"/>
        <circle cx="15" cy="16" r="4" fill="#34d399"/>
        <text x="30" y="20" font-size="10" fill="white" opacity="0.75" font-family="system-ui">ViewContent</text>
        <text x="300" y="20" font-size="9" fill="#64748b" font-family="system-ui">Fired 2.4s ago</text>
      </g>
      <g transform="translate(0,99)">
        <rect width="380" height="32" rx="6" fill="white" fill-opacity="0.03"/>
        <circle cx="15" cy="16" r="4" fill="#34d399"/>
        <text x="30" y="20" font-size="10" fill="white" opacity="0.75" font-family="system-ui">AddToCart</text>
        <text x="300" y="20" font-size="9" fill="#64748b" font-family="system-ui">Fired 5.1s ago</text>
      </g>
      <g transform="translate(0,136)">
        <rect width="380" height="32" rx="6" fill="white" fill-opacity="0.03"/>
        <circle cx="15" cy="16" r="4" fill="#fbbf24"/>
        <text x="30" y="20" font-size="10" fill="white" opacity="0.75" font-family="system-ui">InitiateCheckout</text>
        <text x="300" y="20" font-size="9" fill="#64748b" font-family="system-ui">Pending...</text>
      </g>
    </g>
  </g>
  <!-- Right side: checklist -->
  <g transform="translate(520,75)">
    <text x="0" y="14" font-size="14" font-weight="700" fill="white" opacity="0.85" font-family="system-ui">Verification Steps</text>
    <!-- Check items -->
    <g transform="translate(0,35)">
      <rect width="230" height="42" rx="8" fill="white" fill-opacity="0.04" stroke="#34d399" stroke-opacity="0.2"/>
      <circle cx="22" cy="21" r="8" fill="#34d399" opacity="0.2"/>
      <polyline points="17,21 20,24 26,18" fill="none" stroke="#34d399" stroke-width="1.5" stroke-linecap="round"/>
      <text x="40" y="18" font-size="10" font-weight="600" fill="white" opacity="0.8" font-family="system-ui">Install Pixel Helper</text>
      <text x="40" y="32" font-size="9" fill="#64748b" font-family="system-ui">Chrome extension</text>
    </g>
    <g transform="translate(0,87)">
      <rect width="230" height="42" rx="8" fill="white" fill-opacity="0.04" stroke="#34d399" stroke-opacity="0.2"/>
      <circle cx="22" cy="21" r="8" fill="#34d399" opacity="0.2"/>
      <polyline points="17,21 20,24 26,18" fill="none" stroke="#34d399" stroke-width="1.5" stroke-linecap="round"/>
      <text x="40" y="18" font-size="10" font-weight="600" fill="white" opacity="0.8" font-family="system-ui">Check pixel status</text>
      <text x="40" y="32" font-size="9" fill="#64748b" font-family="system-ui">Green = active</text>
    </g>
    <g transform="translate(0,139)">
      <rect width="230" height="42" rx="8" fill="white" fill-opacity="0.04" stroke="#34d399" stroke-opacity="0.2"/>
      <circle cx="22" cy="21" r="8" fill="#34d399" opacity="0.2"/>
      <polyline points="17,21 20,24 26,18" fill="none" stroke="#34d399" stroke-width="1.5" stroke-linecap="round"/>
      <text x="40" y="18" font-size="10" font-weight="600" fill="white" opacity="0.8" font-family="system-ui">Verify in Ads Manager</text>
      <text x="40" y="32" font-size="9" fill="#64748b" font-family="system-ui">Events tab shows data</text>
    </g>
    <g transform="translate(0,191)">
      <rect width="230" height="42" rx="8" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.08"/>
      <circle cx="22" cy="21" r="8" fill="white" opacity="0.08"/>
      <text x="40" y="18" font-size="10" font-weight="600" fill="white" opacity="0.5" font-family="system-ui">Test on mobile</text>
      <text x="40" y="32" font-size="9" fill="#64748b" font-family="system-ui">Cross-device check</text>
    </g>
    <g transform="translate(0,243)">
      <rect width="230" height="42" rx="8" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.08"/>
      <circle cx="22" cy="21" r="8" fill="white" opacity="0.08"/>
      <text x="40" y="18" font-size="10" font-weight="600" fill="white" opacity="0.5" font-family="system-ui">Monitor for 24 hours</text>
      <text x="40" y="32" font-size="9" fill="#64748b" font-family="system-ui">Ensure stable data flow</text>
    </g>
  </g>
  <!-- Bottom -->
  <text x="400" y="425" text-anchor="middle" font-size="12" fill="#94a3b8" font-family="system-ui">Always verify your pixel is firing correctly before running campaigns</text>
</svg>
