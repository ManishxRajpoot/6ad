<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 380px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; color: #1a1a1a; background: #f8f9fa; }

    /* Header */
    .header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: #1a1a2e; color: #fff; }
    .header h2 { font-size: 15px; font-weight: 600; letter-spacing: 0.3px; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .status-dot.online { background: #2ecc71; box-shadow: 0 0 6px #2ecc71; }
    .status-dot.offline { background: #e74c3c; }
    .status-dot.waiting { background: #f39c12; }
    .header-right { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #aaa; }

    /* Sections */
    .section { margin: 8px 12px; background: #fff; border-radius: 8px; border: 1px solid #e8e8e8; overflow: hidden; }
    .section-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; cursor: pointer; user-select: none; background: #fafafa; border-bottom: 1px solid #eee; }
    .section-header:hover { background: #f0f0f0; }
    .section-header h3 { font-size: 12px; font-weight: 600; text-transform: uppercase; color: #666; letter-spacing: 0.5px; }
    .section-header .toggle { font-size: 10px; color: #999; transition: transform 0.2s; }
    .section-header .toggle.collapsed { transform: rotate(-90deg); }
    .section-body { padding: 12px 14px; }
    .section-body.hidden { display: none; }

    /* Settings */
    .field { margin-bottom: 10px; }
    .field label { display: block; font-size: 11px; font-weight: 600; color: #555; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.3px; }
    .field input { width: 100%; padding: 7px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 12px; background: #fafafa; transition: border 0.2s; }
    .field input:focus { outline: none; border-color: #4a90d9; background: #fff; }
    .btn { width: 100%; padding: 8px; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: #1a1a2e; color: #fff; }
    .btn-primary:hover { background: #16213e; }
    .btn-sm { width: auto; padding: 4px 12px; font-size: 11px; }

    /* Status Grid */
    .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .status-item { padding: 8px 10px; background: #f8f9fa; border-radius: 6px; }
    .status-item .label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.3px; }
    .status-item .value { font-size: 13px; font-weight: 600; margin-top: 2px; }
    .status-item .value.ok { color: #2ecc71; }
    .status-item .value.warn { color: #f39c12; }
    .status-item .value.err { color: #e74c3c; }

    /* Activity Log */
    .activity-list { max-height: 240px; overflow-y: auto; }
    .activity-item { display: flex; gap: 8px; padding: 7px 0; border-bottom: 1px solid #f0f0f0; }
    .activity-item:last-child { border-bottom: none; }
    .activity-icon { width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0; margin-top: 1px; }
    .activity-icon.success { background: #d4edda; color: #155724; }
    .activity-icon.error { background: #f8d7da; color: #721c24; }
    .activity-icon.info { background: #d1ecf1; color: #0c5460; }
    .activity-content { flex: 1; min-width: 0; }
    .activity-msg { font-size: 12px; color: #333; word-break: break-word; }
    .activity-time { font-size: 10px; color: #aaa; margin-top: 1px; }
    .empty-state { text-align: center; padding: 20px; color: #aaa; font-size: 12px; }

    /* Stats Bar */
    .stats-bar { display: flex; justify-content: space-around; padding: 10px 12px; background: #1a1a2e; color: #fff; margin-top: 4px; }
    .stat { text-align: center; }
    .stat .num { font-size: 16px; font-weight: 700; }
    .stat .lbl { font-size: 9px; text-transform: uppercase; color: #aaa; letter-spacing: 0.5px; margin-top: 1px; }

    /* Scrollbar */
    .activity-list::-webkit-scrollbar { width: 4px; }
    .activity-list::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }
  </style>
</head>
<body>
  <div class="header">
    <h2>6AD Worker</h2>
    <div class="header-right">
      <span id="statusLabel">Connecting...</span>
      <span class="status-dot waiting" id="statusDot"></span>
    </div>
  </div>

  <!-- Settings Section (collapsible) -->
  <div class="section">
    <div class="section-header" id="settingsToggle">
      <h3>Settings</h3>
      <span class="toggle" id="settingsArrow">&#9660;</span>
    </div>
    <div class="section-body" id="settingsBody">
      <div class="field">
        <label>API Key</label>
        <input type="text" id="apiKey" placeholder="6ad_xxxx...">
      </div>
      <div class="field">
        <label>Server URL</label>
        <input type="text" id="serverUrl" placeholder="https://api.6ad.in">
      </div>
      <button class="btn btn-primary" id="save">Save</button>
    </div>
  </div>

  <!-- Status Section -->
  <div class="section">
    <div class="section-header">
      <h3>Status</h3>
    </div>
    <div class="section-body">
      <div class="status-grid">
        <div class="status-item">
          <div class="label">Token</div>
          <div class="value" id="tokenStatus">--</div>
        </div>
        <div class="status-item">
          <div class="label">Polling</div>
          <div class="value" id="pollStatus">--</div>
        </div>
        <div class="status-item">
          <div class="label">Last Poll</div>
          <div class="value" id="lastPoll">--</div>
        </div>
        <div class="status-item">
          <div class="label">Last Sync</div>
          <div class="value" id="lastSync">--</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Activity Log Section -->
  <div class="section">
    <div class="section-header">
      <h3>Recent Activity</h3>
      <button class="btn btn-sm" id="clearActivity" style="background:#eee;color:#666;">Clear</button>
    </div>
    <div class="section-body" style="padding: 8px 14px;">
      <div class="activity-list" id="activityList">
        <div class="empty-state">No activity yet</div>
      </div>
    </div>
  </div>

  <!-- Stats Bar -->
  <div class="stats-bar">
    <div class="stat">
      <div class="num" id="statTokens">0</div>
      <div class="lbl">Tokens</div>
    </div>
    <div class="stat">
      <div class="num" id="statReceived">0</div>
      <div class="lbl">Received</div>
    </div>
    <div class="stat">
      <div class="num" id="statCompleted">0</div>
      <div class="lbl">Completed</div>
    </div>
    <div class="stat">
      <div class="num" id="statFailed">0</div>
      <div class="lbl">Failed</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
